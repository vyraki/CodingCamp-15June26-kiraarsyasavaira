<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Dashboard</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>

    <!-- ───────── TOP BAR (theme toggle) ───────── -->
    <div class="topbar">
      <button class="btn btn-ghost theme-toggle" id="theme-toggle" aria-label="Toggle light/dark mode">
        <span class="theme-icon">🌙</span>
        <span class="theme-label">Dark</span>
      </button>
    </div>

    <!-- ───────── GREETING SECTION ───────── -->
    <header class="greeting-section">
      <div class="greeting-content">
        <p id="current-date" class="date-text"></p>
        <h1 id="greeting-text" class="greeting-text"></h1>
        <p id="current-time" class="time-text"></p>

        <!-- Custom name row -->
        <div class="name-row" id="name-display-row">
          <span class="name-label" id="name-display"></span>
          <button class="btn-inline" id="name-edit-btn" aria-label="Edit your name">✏️ Edit name</button>
        </div>
        <div class="name-row name-edit-row hidden" id="name-edit-row">
          <input
            type="text"
            id="name-input"
            class="text-input name-input"
            placeholder="Enter your name…"
            maxlength="40"
          />
          <button class="btn btn-primary btn-sm" id="name-save-btn">Save</button>
          <button class="btn btn-ghost btn-sm" id="name-cancel-btn">Cancel</button>
        </div>
      </div>
    </header>

    <!-- ───────── MAIN CONTENT ───────── -->
    <main class="dashboard">

      <!-- FOCUS TIMER -->
      <section class="card timer-card">
        <h2 class="card-title">Focus Timer</h2>
        <div class="timer-display" id="timer-display">25:00</div>
        <div class="timer-controls">
          <button class="btn btn-primary" id="timer-start">Start</button>
          <button class="btn btn-secondary" id="timer-stop">Stop</button>
          <button class="btn btn-ghost" id="timer-reset">Reset</button>
        </div>
        <!-- Custom duration -->
        <div class="timer-custom">
          <label for="timer-custom-input" class="custom-label">Custom minutes:</label>
          <input
            type="number"
            id="timer-custom-input"
            class="text-input timer-custom-input"
            min="1"
            max="120"
            placeholder="25"
          />
          <button class="btn btn-ghost btn-sm" id="timer-set-btn">Set</button>
        </div>
      </section>

      <!-- TO-DO LIST -->
      <section class="card todo-card">
        <h2 class="card-title">To-Do List</h2>
        <div class="todo-input-row">
          <input
            type="text"
            id="todo-input"
            class="text-input"
            placeholder="Add a new task…"
            maxlength="120"
          />
          <button class="btn btn-primary" id="todo-add">Add</button>
        </div>
        <!-- duplicate warning -->
        <p class="duplicate-warning hidden" id="duplicate-warning">⚠️ That task already exists!</p>
        <!-- sort controls -->
        <div class="sort-row">
          <span class="sort-label">Sort:</span>
          <button class="btn btn-ghost btn-sm sort-btn active" data-sort="default" id="sort-default">Default</button>
          <button class="btn btn-ghost btn-sm sort-btn" data-sort="az"      id="sort-az">A → Z</button>
          <button class="btn btn-ghost btn-sm sort-btn" data-sort="pending" id="sort-pending">Pending first</button>
        </div>
        <ul class="todo-list" id="todo-list"></ul>
      </section>

      <!-- QUICK LINKS -->
      <section class="card links-card">
        <h2 class="card-title">Quick Links</h2>
        <div class="links-input-row">
          <input
            type="text"
            id="link-name-input"
            class="text-input"
            placeholder="Label"
            maxlength="40"
          />
          <input
            type="url"
            id="link-url-input"
            class="text-input"
            placeholder="https://example.com"
          />
          <button class="btn btn-primary" id="link-add">Add</button>
        </div>
        <div class="links-grid" id="links-grid"></div>
      </section>

    </main>

    <!-- EDIT TASK MODAL -->
    <div class="modal-overlay" id="edit-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal">
        <h3 class="modal-title" id="modal-title">Edit Task</h3>
        <input type="text" id="edit-input" class="text-input" maxlength="120" />
        <p class="duplicate-warning hidden" id="edit-duplicate-warning">⚠️ A task with that name already exists!</p>
        <div class="modal-actions">
          <button class="btn btn-primary" id="edit-save">Save</button>
          <button class="btn btn-ghost" id="edit-cancel">Cancel</button>
        </div>
      </div>
    </div>

    <script src="js/app.js"></script>
  </body>
</html>
